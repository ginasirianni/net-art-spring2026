<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheetah Print Screensaver</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .screen {
      position: relative;
      width: 95vw;
      height: 95vh;
      overflow: hidden;
      border: 6px solid #1a1a1a;
      background: linear-gradient(to bottom, #2a1d14, #120d09);
      cursor: pointer;
      transition: background 1s ease;
    }

    .message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      color: #f3d2a2;
      font-size: 2rem;
      letter-spacing: 2px;
      text-align: center;
      transition: opacity 0.8s ease;
    }

    .screen:hover .message {
      opacity: 0;
    }

    .screen:hover {
      background: linear-gradient(to bottom, #5a3a20, #2a160d);
    }

    .spot-group {
      position: absolute;
      width: 180px;
      height: 180px;
      opacity: 0;
      transition: opacity 1s ease;
      animation-play-state: paused;
    }

    .screen:hover .spot-group {
      opacity: 1;
      animation-play-state: running;
    }

    .screen:active .spot-group {
      animation-duration: 3s;
    }

    .spot {
      position: absolute;
      background: #111;
      border-radius: 50% 40% 55% 45%;
      opacity: 0.95;
    }

    /* Spots inside each group */
    .spot1 { width: 35px; height: 28px; top: 15px; left: 20px; transform: rotate(20deg); }
    .spot2 { width: 28px; height: 22px; top: 60px; left: 80px; transform: rotate(-15deg); }
    .spot3 { width: 32px; height: 26px; top: 100px; left: 35px; transform: rotate(10deg); }
    .spot4 { width: 24px; height: 20px; top: 35px; left: 120px; transform: rotate(30deg); }
    .spot5 { width: 30px; height: 24px; top: 115px; left: 110px; transform: rotate(-20deg); }
    .spot6 { width: 18px; height: 15px; top: 75px; left: 140px; transform: rotate(10deg); }
    .spot7 { width: 20px; height: 16px; top: 140px; left: 75px; transform: rotate(-10deg); }

    /* group styling */
    .group {
      background: #c98b47;
      border-radius: 30px;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.06);
    }

    .g1 {
      top: 8%;
      left: 6%;
      animation: float1 9s linear infinite paused;
    }

    .g2 {
      top: 18%;
      right: 10%;
      animation: float2 11s linear infinite paused;
    }

    .g3 {
      bottom: 10%;
      left: 12%;
      animation: float3 10s linear infinite paused;
    }

    .g4 {
      bottom: 14%;
      right: 14%;
      animation: float4 12s linear infinite paused;
    }

    .g5 {
      top: 38%;
      left: 40%;
      animation: float5 8s linear infinite paused;
    }

    .g6 {
      top: 58%;
      right: 30%;
      animation: float6 10s linear infinite paused;
    }

    @keyframes float1 {
      0%   { transform: translate(0, 0) rotate(0deg); }
      25%  { transform: translate(120px, 50px) rotate(10deg); }
      50%  { transform: translate(250px, 120px) rotate(20deg); }
      75%  { transform: translate(100px, 180px) rotate(8deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    @keyframes float2 {
      0%   { transform: translate(0, 0) rotate(0deg); }
      25%  { transform: translate(-110px, 60px) rotate(-8deg); }
      50%  { transform: translate(-220px, 160px) rotate(-18deg); }
      75%  { transform: translate(-90px, 40px) rotate(-8deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    @keyframes float3 {
      0%   { transform: translate(0, 0) scale(1); }
      25%  { transform: translate(130px, -70px) scale(1.05); }
      50%  { transform: translate(260px, -140px) scale(0.95); }
      75%  { transform: translate(90px, -40px) scale(1.04); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes float4 {
      0%   { transform: translate(0, 0) scale(1); }
      25%  { transform: translate(-120px, -80px) scale(1.05); }
      50%  { transform: translate(-240px, -150px) scale(0.96); }
      75%  { transform: translate(-80px, -30px) scale(1.03); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes float5 {
      0%   { transform: translate(0, 0) rotate(0deg); }
      25%  { transform: translate(100px, -80px) rotate(15deg); }
      50%  { transform: translate(-20px, -170px) rotate(25deg); }
      75%  { transform: translate(-100px, -50px) rotate(10deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    @keyframes float6 {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-120px, 50px); }
      50%  { transform: translate(-220px, -30px); }
      75%  { transform: translate(-60px, -120px); }
      100% { transform: translate(0, 0); }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="message">Hover to Start Cheetah Print Screensaver</div>

    <div class="spot-group group g1">
      <div class="spot spot1"></div><div class="spot spot2"></div><div class="spot spot3"></div>
      <div class="spot spot4"></div><div class="spot spot5"></div><div class="spot spot6"></div><div class="spot spot7"></div>
    </div>

    <div class="spot-group group g2">
      <div class="spot spot1"></div><div class="spot spot2"></div><div class="spot spot3"></div>
      <div class="spot spot4"></div><div class="spot spot5"></div><div class="spot spot6"></div><div class="spot spot7"></div>
    </div>

    <div class="spot-group group g3">
      <div class="spot spot1"></div><div class="spot spot2"></div><div class="spot spot3"></div>
      <div class="spot spot4"></div><div class="spot spot5"></div><div class="spot spot6"></div><div class="spot spot7"></div>
    </div>

    <div class="spot-group group g4">
      <div class="spot spot1"></div><div class="spot spot2"></div><div class="spot spot3"></div>
      <div class="spot spot4"></div><div class="spot spot5"></div><div class="spot spot6"></div><div class="spot spot7"></div>
    </div>

    <div class="spot-group group g5">
      <div class="spot spot1"></div><div class="spot spot2"></div><div class="spot spot3"></div>
      <div class="spot spot4"></div><div class="spot spot5"></div><div class="spot spot6"></div><div class="spot spot7"></div>
    </div>

    <div class="spot-group group g6">
      <div class="spot spot1"></div><div class="spot spot2"></div><div class="spot spot3"></div>
      <div class="spot spot4"></div><div class="spot spot5"></div><div class="spot spot6"></div><div class="spot spot7"></div>
    </div>
  </div>
</body>
</html>
